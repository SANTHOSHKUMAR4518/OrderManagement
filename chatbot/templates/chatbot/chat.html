{% extends 'orders/base.html' %}

{% block title %}
AI Order Assistant
{% endblock %}


{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow">

                <div class="card-header bg-primary text-white text-center">
                    <h3>
                        🤖 AI Order Assistant
                    </h3>
                </div>


                <div class="card-body">


                    <form method="POST">

                        {% csrf_token %}

                        <label class="form-label">
                            Ask your question
                        </label>

                        <input 
                        type="text"
                        name="question"
                        class="form-control mb-3"
                        placeholder="Example: revenue, order status, low stock">


                        <div class="text-center">

                            <button class="btn btn-success">
                                Send
                            </button>

                        </div>

                    </form>



                    {% if response %}

                    <div class="card mt-4">

                        <div class="card-body bg-light">

                            <h5>
                                🤖 AI Response
                            </h5>

                            <hr>

                            {{ response|linebreaks }}

                        </div>

                    </div>

                    {% endif %}



                </div>

            </div>

        </div>

    </div>

</div>


{% endblock %}
