<!DOCTYPE html>

<html>
<head>
    <title>Admin Login</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body>

<div class="container mt-5">


<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-body">

                <h2 class="text-center mb-4">
                    Admin Login
                </h2>

                {% if error %}
                    <div class="alert alert-danger">
                        {{ error }}
                    </div>
                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Admin Username
                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            placeholder="Enter Admin Username"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter Password"
                            required
                        >

                    </div>

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-danger">
                            Admin Login
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>


</div>

</body>
</html>
