<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Order Management{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand" href="{% url 'dashboard' %}">
            Order Management
        </a>


        <div>

            <a href="{% url 'dashboard' %}" class="btn btn-outline-light mx-1">
                Dashboard
            </a>

            <a href="{% url 'view_products' %}" class="btn btn-outline-light mx-1">
                Products
            </a>

            <a href="{% url 'view_orders' %}" class="btn btn-outline-light mx-1">
                Orders
            </a>
            <a href="{% url 'chat' %}" class="btn btn-info mx-1">🤖 AI Assistant</a>
            
            <span class="text-white mx-2">Welcome, {{ request.user.username }}</span>

            <a href="{% url 'profile' %}" class="btn btn-outline-info mx-1">Profile</a>
            <a href="{% url 'logout' %}" class="btn btn-danger mx-1">Logout</a>

        </div>

    </div>

</nav>


<div class="container mt-4">

{% block content %}

{% endblock %}

</div>


</body>
</html>
