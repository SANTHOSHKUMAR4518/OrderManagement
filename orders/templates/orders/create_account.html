<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Create Account</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-box {
            background: white;
            padding: 40px;
            border-radius: 25px;
            width: 400px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .register-box h2 {
            color: #0072ff;
            font-weight: bold;
        }

    </style>

</head>

<body>

<div class="register-box">

    <h2 class="text-center mb-4">
        👤 Create User Account
    </h2>

    {% if error %}

        <div class="alert alert-danger">
            {{ error }}
        </div>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Create username"
                required
            >

        </div>

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Create password"
                required
            >

        </div>

        <button
            type="submit"
            class="btn btn-primary w-100">
            Create Account
        </button>

    </form>

    <div class="text-center mt-3">

        <a href="{% url 'login' %}">
            Already have an account? Login
        </a>

    </div>

</div>

</body>
</html>
