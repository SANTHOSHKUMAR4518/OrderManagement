<!DOCTYPE html>

<html>
<head>
    <title>Edit Order</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body>

<div class="container mt-5">


<div class="card shadow">

    <div class="card-body">

        <h2 class="text-center mb-4">
            Edit Order
        </h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Customer Name
                </label>

                <input
                    type="text"
                    name="customer_name"
                    class="form-control"
                    value="{{ order.customer_name }}"
                    required
                >

            </div>


            <div class="mb-3">

                <label class="form-label">
                    Product
                </label>

                <select
                    name="product"
                    class="form-select"
                    required
                >

                    {% for product in products %}

                    <option
                        value="{{ product.id }}"
                        {% if product.id == order.product.id %}
                            selected
                        {% endif %}
                    >
                        {{ product.name }}
                    </option>

                    {% endfor %}

                </select>

            </div>


            <div class="mb-3">

                <label class="form-label">
                    Quantity
                </label>

                <input
                    type="number"
                    name="quantity"
                    class="form-control"
                    value="{{ order.quantity }}"
                    min="1"
                    required
                >

            </div>


            <div class="mb-3">

                <label class="form-label">
                    Order Status
                </label>

                <select
                    name="status"
                    class="form-select"
                    required
                >

                    <option value="Pending"
                        {% if order.status == "Pending" %}
                            selected
                        {% endif %}>
                        Pending
                    </option>

                    <option value="Confirmed"
                        {% if order.status == "Confirmed" %}
                            selected
                        {% endif %}>
                        Confirmed
                    </option>

                    <option value="Processing"
                        {% if order.status == "Processing" %}
                            selected
                        {% endif %}>
                        Processing
                    </option>

                    <option value="Shipped"
                        {% if order.status == "Shipped" %}
                            selected
                        {% endif %}>
                        Shipped
                    </option>

                    <option value="Delivered"
                        {% if order.status == "Delivered" %}
                            selected
                        {% endif %}>
                        Delivered
                    </option>

                </select>

            </div>


            <div class="text-center">

                <button
                    type="submit"
                    class="btn btn-success">
                    Update Order
                </button>

                <a
                    href="{% url 'view_orders' %}"
                    class="btn btn-secondary">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>


</div>

</body>
</html>
