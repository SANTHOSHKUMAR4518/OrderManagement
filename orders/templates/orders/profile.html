{% extends 'orders/base.html' %}

{% block title %}
Profile
{% endblock %}


{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow">

            <div class="card-body text-center">

                <h2 class="mb-4">
                    User Profile
                </h2>


                <h4>
                    Username:
                </h4>

                <p class="fs-5">
                    {{ request.user.username }}
                </p>


                <h4>
                    Email:
                </h4>

                <p class="fs-5">
                    {{ request.user.email }}
                </p>


                <a href="{% url 'dashboard' %}" 
                   class="btn btn-secondary mt-3">
                    Back to Dashboard
                </a>


            </div>

        </div>

    </div>

</div>


{% endblock %}
